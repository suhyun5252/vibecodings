<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>간단한 퍼즐 게임</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --board: #b9f2c6;
      --board-border: #9be7af;
      --accent: #2f6fed;
      --accent-hover: #2459c9;
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.95), transparent 36%),
        linear-gradient(180deg, #eff3fb 0%, #f6f8fc 100%);
    }

    .app {
      width: min(100%, 520px);
      background: var(--card);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 28px 22px 20px;
    }

    .title {
      margin: 0;
      text-align: center;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: -0.03em;
      font-weight: 800;
    }

    .subtitle {
      margin: 10px 0 22px;
      text-align: center;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .screen {
      display: grid;
      gap: 18px;
    }

    .screen.hidden {
      display: none;
    }

    .screen-copy {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      text-align: center;
    }

    .result-score {
      margin: 0;
      color: var(--text);
      font-size: 24px;
      font-weight: 800;
      text-align: center;
    }

    .primary-action {
      border: 0;
      background: var(--accent);
      color: white;
      font-size: 18px;
      font-weight: 800;
      padding: 14px 18px;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      box-shadow: 0 10px 22px rgba(47, 111, 237, 0.2);
    }

    .primary-action:hover {
      background: var(--accent-hover);
    }

    .primary-action:active {
      transform: translateY(1px);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }

    .difficulty-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
    }

    .difficulty-control select {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      padding: 9px 30px 9px 12px;
      cursor: pointer;
    }

    .game-stat {
      font-size: 18px;
      font-weight: 700;
    }

    .restart {
      border: 0;
      background: var(--accent);
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      box-shadow: 0 8px 18px rgba(47, 111, 237, 0.18);
    }

    .restart:hover {
      background: var(--accent-hover);
    }

    .restart:active {
      transform: translateY(1px);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(var(--board-size, 4), 1fr);
      gap: 8px;
      margin: 8px 0 18px;
      perspective: 900px;
    }

    .card {
      aspect-ratio: 1 / 1;
      border: 0;
      border-radius: 16px;
      background: transparent;
      display: grid;
      place-items: center;
      font-size: var(--card-font-size, 28px);
      cursor: pointer;
      user-select: none;
      position: relative;
      overflow: hidden;
      padding: 0;
      perspective: 700px;
      transition: transform 0.15s ease, filter 0.2s ease;
    }

    .card:hover {
      transform: translateY(-1px);
      filter: brightness(1.01);
    }

    .card:active {
      transform: translateY(1px) scale(0.99);
    }

    .card:disabled {
      cursor: default;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.46s cubic-bezier(0.2, 0.72, 0.24, 1);
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border: 1px solid var(--board-border);
      border-radius: 16px;
      display: grid;
      place-items: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35), 0 8px 16px rgba(15, 23, 42, 0.08);
    }

    .card-back {
      background:
        radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.55), transparent 28%),
        linear-gradient(135deg, #bdf5cc 0%, #82d99b 100%);
    }

    .card-back::before {
      content: "?";
      color: rgba(31, 41, 55, 0.42);
      font-size: 0.9em;
      font-weight: 800;
    }

    .card-front {
      background: linear-gradient(180deg, #f8fff9 0%, #d4f8dd 100%);
      transform: rotateY(180deg);
    }

    .card .emoji {
      transform: scale(0.96);
      transition: transform 0.2s ease;
    }

    .card.flipped .emoji,
    .card.matched .emoji {
      transform: scale(1.08);
    }

    .card.matched {
      filter: saturate(1.12);
    }

    .card.matched .card-front {
      border-color: rgba(47, 111, 237, 0.22);
      box-shadow: inset 0 0 0 1px rgba(47, 111, 237, 0.08), 0 8px 16px rgba(15, 23, 42, 0.08);
    }

    .card.empty {
      cursor: default;
    }

    .card.empty .card-face {
      border-style: dashed;
      background: #eef2f7;
      box-shadow: none;
    }

    .card.empty .card-back::before {
      content: "";
    }

    .card.empty:hover {
      transform: none;
      filter: none;
    }

    .message {
      min-height: 28px;
      text-align: center;
      font-weight: 700;
      font-size: 16px;
      line-height: 1.4;
      color: #1f2937;
    }

    .message.done {
      color: #1f6b34;
    }

    @media (max-width: 420px) {
      .app {
        padding: 22px 16px 18px;
        border-radius: 18px;
      }

      .title {
        font-size: 26px;
      }

      .subtitle {
        font-size: 14px;
      }

      .toolbar {
        align-items: stretch;
      }

      .difficulty-control,
      .game-stat {
        font-size: 16px;
      }

      .restart {
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="screen" id="startScreen" aria-label="게임 시작 화면">
      <h1 class="title">간단한 퍼즐 게임</h1>
      <p class="screen-copy">쉬움 단계부터 시작해 모든 퍼즐을 차례대로 클리어해보세요.</p>
      <button class="primary-action" id="startButton" type="button">게임 시작</button>
    </section>

    <section class="screen hidden" id="gameScreen" aria-label="퍼즐 게임 화면">
      <h1 class="title">간단한 퍼즐 게임</h1>
      <p class="subtitle">같은 그림 2개를 찾아 모두 맞추면 다음 단계로 이동합니다.</p>

      <section class="toolbar" aria-label="게임 정보">
        <div class="difficulty-control">
          단계: <span id="stageCount">1/4</span>
          난이도: <span id="stageLabel">쉬움</span>
        </div>
        <div class="game-stat">
          시도 횟수: <span id="attemptCount">0</span>
          점수: <span id="scoreCount">0</span>
          남은 시간: <span id="timeCount">0</span>초
        </div>
        <button class="restart" id="restartButton" type="button">다시 시작</button>
      </section>

      <section class="board" id="board" aria-label="퍼즐 보드"></section>

      <div class="message" id="message">같은 그림을 찾아서 짝을 맞춰보세요.</div>
    </section>

    <section class="screen hidden" id="endScreen" aria-label="게임 종료 화면">
      <h1 class="title">축하합니다!</h1>
      <p class="screen-copy">모든 단계를 통과했습니다.</p>
      <p class="result-score">최종 점수: <span id="finalScore">0</span>점</p>
      <button class="primary-action" id="playAgainButton" type="button">다시 도전</button>
    </section>
  </main>

  <script>
    // 과일 후보 목록입니다.
    // 매 게임마다 난이도에 맞는 수만큼 골라서 카드로 사용합니다.
    const fruit_pool = ["🍇", "🍓", "🥝", "🍑", "🍎", "🍉", "🍒", "🍊", "🍐", "🍋", "🍌", "🍍", "🥭", "🍈", "🍏", "🫐"];

    fruit_pool.push("🥦", "🥔", "🍄", "🥬", "🫛", "🌶️", "🫑", "🥨", "🧀", "🍞");

    const difficulty_settings = {
      easy: { label: "쉬움", size: 3, time_limit: 30 },
      medium1: { label: "중간1", size: 4, time_limit: 60 },
      medium2: { label: "중간2", size: 5, time_limit: 90 },
      hard: { label: "어려움", size: 6, time_limit: 120 },
    };
    const stage_order = ["easy", "medium1", "medium2", "hard"];

    // 화면에서 사용할 DOM 요소를 미리 찾아 둡니다.
    const start_screen_element = document.getElementById("startScreen");
    const game_screen_element = document.getElementById("gameScreen");
    const end_screen_element = document.getElementById("endScreen");
    const board_element = document.getElementById("board");
    const stage_count_element = document.getElementById("stageCount");
    const stage_label_element = document.getElementById("stageLabel");
    const attempt_count_element = document.getElementById("attemptCount");
    const score_count_element = document.getElementById("scoreCount");
    const time_count_element = document.getElementById("timeCount");
    const final_score_element = document.getElementById("finalScore");
    const start_button = document.getElementById("startButton");
    const restart_button = document.getElementById("restartButton");
    const play_again_button = document.getElementById("playAgainButton");
    const message_element = document.getElementById("message");

    // 현재 게임 상태를 저장하는 변수들입니다.
    let first_card = null;
    let second_card = null;
    let board_locked = false;
    let attempt_count = 0;
    let score_count = 0;
    let time_left = 0;
    let matched_pairs = 0;
    let hide_cards_timeout_id = null;
    let timer_interval_id = null;
    let next_stage_timeout_id = null;
    let selected_emoji_list = [];
    let current_stage_index = 0;
    let current_difficulty = difficulty_settings[stage_order[current_stage_index]];
    let is_game_over = false;

    function shuffle_array(array) {
      // 원본 배열은 건드리지 않기 위해 복사본을 만듭니다.
      const shuffled_array = [...array];

      // Fisher-Yates 방식으로 배열을 섞습니다.
      // 이 방식은 sort + Math.random()보다 더 안정적으로 무작위 순서를 만듭니다.
      for (let index = shuffled_array.length - 1; index > 0; index -= 1) {
        const random_index = Math.floor(Math.random() * (index + 1));
        [shuffled_array[index], shuffled_array[random_index]] = [shuffled_array[random_index], shuffled_array[index]];
      }

      return shuffled_array;
    }

    function get_random_items(array, count) {
      // 배열에서 중복 없이 랜덤 항목을 골라냅니다.
      // 먼저 섞은 뒤 앞에서 count개를 꺼내면 간단하고 안전합니다.
      return shuffle_array(array).slice(0, count);
    }

    function set_message(text, is_done = false) {
      // 하단 안내 문구를 바꾸고, 클리어 상태면 강조 스타일을 줍니다.
      message_element.textContent = text;
      message_element.classList.toggle("done", is_done);
    }

    function show_start_screen() {
      // 시작 화면만 보이게 하고 진행 중인 타이머를 멈춥니다.
      stop_timer();
      clear_next_stage_timer();
      start_screen_element.classList.remove("hidden");
      game_screen_element.classList.add("hidden");
      end_screen_element.classList.add("hidden");
    }

    function show_game_screen() {
      // 플레이 화면만 보이게 합니다.
      start_screen_element.classList.add("hidden");
      game_screen_element.classList.remove("hidden");
      end_screen_element.classList.add("hidden");
    }

    function show_end_screen() {
      // 모든 단계를 통과했을 때 종료 화면을 보여줍니다.
      stop_timer();
      clear_next_stage_timer();
      final_score_element.textContent = score_count;
      start_screen_element.classList.add("hidden");
      game_screen_element.classList.add("hidden");
      end_screen_element.classList.remove("hidden");
    }

    function reset_selected_cards() {
      // 한 번의 시도 처리가 끝나면 선택한 카드 정보를 초기화합니다.
      first_card = null;
      second_card = null;
      board_locked = is_game_over;
    }

    function update_attempt_count() {
      // 화면에 보이는 시도 횟수를 숫자 상태와 맞춥니다.
      attempt_count_element.textContent = attempt_count;
    }

    function update_score_count() {
      // 화면에 보이는 점수를 숫자 상태와 맞춥니다.
      score_count_element.textContent = score_count;
    }

    function update_time_count() {
      // 화면에 보이는 남은 시간을 숫자 상태와 맞춥니다.
      time_count_element.textContent = time_left;
    }

    function update_stage_info() {
      // 현재 단계와 난이도를 화면에 표시합니다.
      stage_count_element.textContent = `${current_stage_index + 1}/${stage_order.length}`;
      stage_label_element.textContent = current_difficulty.label;
    }

    function stop_timer() {
      // 기존 카운트다운이 있으면 멈춥니다.
      if (timer_interval_id !== null) {
        clearInterval(timer_interval_id);
        timer_interval_id = null;
      }
    }

    function clear_next_stage_timer() {
      // 다음 단계로 넘어가는 예약이 있으면 취소합니다.
      if (next_stage_timeout_id !== null) {
        clearTimeout(next_stage_timeout_id);
        next_stage_timeout_id = null;
      }
    }

    function disable_all_cards() {
      // 게임 종료 후에는 더 이상 카드를 누를 수 없게 합니다.
      board_element.querySelectorAll(".card").forEach((card_element) => {
        card_element.disabled = true;
      });
    }

    function handle_game_over() {
      // 시간이 끝나면 진행 중인 뒤집기 예약도 멈추고 게임을 종료합니다.
      is_game_over = true;
      board_locked = true;
      stop_timer();

      if (hide_cards_timeout_id !== null) {
        clearTimeout(hide_cards_timeout_id);
        hide_cards_timeout_id = null;
      }

      disable_all_cards();
      set_message(`게임오버! 제한 시간 안에 모두 맞추지 못했습니다. 점수: ${score_count}점`);
    }

    function start_timer() {
      // 1초마다 남은 시간을 줄이고, 0초가 되면 게임오버 처리합니다.
      stop_timer();
      update_time_count();

      timer_interval_id = setInterval(() => {
        time_left -= 1;

        if (time_left <= 0) {
          time_left = 0;
          update_time_count();
          handle_game_over();
          return;
        }

        update_time_count();
      }, 1000);
    }

    function mark_cards_as_matched(first_element, second_element) {
      // 같은 그림인 카드 2장은 맞춘 상태로 고정합니다.
      first_element.classList.add("matched");
      second_element.classList.add("matched");
      first_element.disabled = true;
      second_element.disabled = true;
      matched_pairs += 1;
      score_count += 10;
      update_score_count();
    }

    function is_game_clear() {
      // 모든 그림 쌍을 맞췄는지 확인합니다.
      return matched_pairs === selected_emoji_list.length;
    }

    function show_clear_message() {
      // 게임을 모두 맞췄을 때 보여줄 문구입니다.
      stop_timer();
      board_locked = true;

      if (current_stage_index >= stage_order.length - 1) {
        set_message(`축하합니다! 모든 단계를 클리어했습니다. 최종 점수: ${score_count}점`, true);
        next_stage_timeout_id = setTimeout(() => {
          show_end_screen();
          next_stage_timeout_id = null;
        }, 1200);
        return;
      }

      set_message(`${current_difficulty.label} 단계 클리어! 잠시 후 다음 단계로 이동합니다.`, true);

      next_stage_timeout_id = setTimeout(() => {
        current_stage_index += 1;
        start_stage();
        next_stage_timeout_id = null;
      }, 1400);
    }

    function reveal_card(card_element) {
      // 카드 앞면이 보이도록 뒤집는 역할입니다.
      card_element.classList.add("flipped");
    }

    function hide_card(card_element) {
      // 맞지 않는 카드 두 장을 다시 뒤집는 역할입니다.
      // 재시작 직후처럼 카드가 없을 수도 있으니 먼저 확인합니다.
      if (!card_element) {
        return;
      }

      card_element.classList.remove("flipped");
    }

    function compare_cards() {
      // 두 카드의 data-value가 같으면 같은 그림입니다.
      return first_card.dataset.value === second_card.dataset.value;
    }

    function handle_matched_pair() {
      // 같은 그림이면 카드들을 맞춘 상태로 표시하고, 턴을 초기화합니다.
      mark_cards_as_matched(first_card, second_card);
      set_message("잘 찾았어요! 같은 그림입니다.");
      reset_selected_cards();

      if (is_game_clear()) {
        show_clear_message();
      }
    }

    function handle_mismatched_pair() {
      // 다른 그림이면 잠깐 보여준 뒤 다시 뒤집습니다.
      set_message("다른 그림입니다. 잠깐 뒤에 다시 뒤집어요.");

      // 재시작 전에 예약된 타이머가 남아 있으면 먼저 지웁니다.
      if (hide_cards_timeout_id !== null) {
        clearTimeout(hide_cards_timeout_id);
      }

      // 현재 선택된 카드 2장을 따로 저장해 둡니다.
      // 나중에 first_card / second_card가 초기화되어도 안전하게 사용할 수 있습니다.
      const first_selected_card = first_card;
      const second_selected_card = second_card;

      hide_cards_timeout_id = setTimeout(() => {
        // 게임을 다시 시작했으면 카드가 없을 수 있으니 안전하게 처리합니다.
        hide_card(first_selected_card);
        hide_card(second_selected_card);
        set_message("다시 같은 그림을 찾아보세요.");
        reset_selected_cards();
        hide_cards_timeout_id = null;
      }, 700);
    }

    function handle_second_selection(card_element) {
      // 두 번째 카드를 선택했을 때 매칭 비교를 시작합니다.
      second_card = card_element;
      attempt_count += 1;
      update_attempt_count();
      board_locked = true;

      if (compare_cards()) {
        handle_matched_pair();
        return;
      }

      handle_mismatched_pair();
    }

    function handle_card_click(card_element) {
      // 이미 맞춘 카드, 같은 카드 재클릭, 비교 중인 상태는 무시합니다.
      if (is_game_over || board_locked || card_element === first_card || card_element.classList.contains("matched")) {
        return;
      }

      reveal_card(card_element);

      if (!first_card) {
        // 첫 번째 카드가 아직 없다면 지금 카드를 저장합니다.
        first_card = card_element;
        return;
      }

      // 두 번째 카드까지 선택되면 비교 로직으로 넘어갑니다.
      handle_second_selection(card_element);
    }

    function create_card_element(emoji) {
      // 카드 1장을 버튼 요소로 만듭니다.
      const card_element = document.createElement("button");
      card_element.type = "button";
      card_element.className = "card";
      card_element.dataset.value = emoji;
      card_element.setAttribute("aria-label", "카드");

      // 카드 안에 앞면과 뒷면을 넣어 3D 회전처럼 보이게 합니다.
      const card_inner_element = document.createElement("span");
      card_inner_element.className = "card-inner";

      const card_back_element = document.createElement("span");
      card_back_element.className = "card-face card-back";

      const card_front_element = document.createElement("span");
      card_front_element.className = "card-face card-front";

      const emoji_element = document.createElement("span");
      emoji_element.className = "emoji";
      emoji_element.textContent = emoji;

      card_front_element.appendChild(emoji_element);
      card_inner_element.appendChild(card_back_element);
      card_inner_element.appendChild(card_front_element);
      card_element.appendChild(card_inner_element);
      card_element.addEventListener("click", () => handle_card_click(card_element));

      return card_element;
    }

    function create_empty_card_element() {
      // 홀수 크기 보드에서는 짝이 맞지 않는 마지막 칸을 빈칸으로 둡니다.
      const empty_card_element = document.createElement("button");
      empty_card_element.type = "button";
      empty_card_element.className = "card empty";
      empty_card_element.disabled = true;
      empty_card_element.setAttribute("aria-label", "빈 칸");

      const card_inner_element = document.createElement("span");
      card_inner_element.className = "card-inner";

      const card_back_element = document.createElement("span");
      card_back_element.className = "card-face card-back";

      card_inner_element.appendChild(card_back_element);
      empty_card_element.appendChild(card_inner_element);

      return empty_card_element;
    }

    function update_board_size() {
      // 난이도에 맞게 보드 열 개수와 카드 글자 크기를 조정합니다.
      board_element.style.setProperty("--board-size", current_difficulty.size);
      board_element.style.setProperty("--card-font-size", current_difficulty.size >= 6 ? "22px" : "28px");
    }

    function render_board() {
      // 난이도별 보드 크기에 맞춰 필요한 쌍의 수를 계산합니다.
      // 3x3, 5x5처럼 칸 수가 홀수면 마지막 1칸은 빈칸으로 둡니다.
      const total_card_count = current_difficulty.size * current_difficulty.size;
      const pair_count = Math.floor(total_card_count / 2);
      const has_empty_card = total_card_count % 2 === 1;

      selected_emoji_list = get_random_items(fruit_pool, pair_count);
      const card_item_list = shuffle_array([...selected_emoji_list, ...selected_emoji_list]);

      if (has_empty_card) {
        const center_index = Math.floor(total_card_count / 2);
        card_item_list.splice(center_index, 0, null);
      }
      board_element.innerHTML = "";
      update_board_size();

      // 섞인 순서대로 카드 요소를 화면에 배치합니다.
      card_item_list.forEach((emoji) => {
        const card_element = emoji === null ? create_empty_card_element() : create_card_element(emoji);
        board_element.appendChild(card_element);
      });
    }

    function start_stage() {
      // 현재 단계의 보드와 시간, 시도 횟수를 새로 시작합니다.
      show_game_screen();
      stop_timer();
      clear_next_stage_timer();

      if (hide_cards_timeout_id !== null) {
        clearTimeout(hide_cards_timeout_id);
        hide_cards_timeout_id = null;
      }

      first_card = null;
      second_card = null;
      board_locked = false;
      is_game_over = false;
      attempt_count = 0;
      matched_pairs = 0;
      selected_emoji_list = [];
      current_difficulty = difficulty_settings[stage_order[current_stage_index]];
      time_left = current_difficulty.time_limit;
      update_stage_info();
      update_attempt_count();
      update_score_count();
      update_time_count();
      set_message(`${current_stage_index + 1}단계 ${current_difficulty.label} 난이도입니다. ${time_left}초 안에 같은 그림을 모두 맞춰보세요.`);
      render_board();
      start_timer();
    }

    function reset_game() {
      // 전체 게임을 처음 단계부터 다시 시작합니다.
      current_stage_index = 0;
      score_count = 0;
      start_stage();
    }

    function start_new_game() {
      // 시작 화면의 버튼으로 새 게임을 시작합니다.
      reset_game();
    }

    restart_button.addEventListener("click", reset_game);
    start_button.addEventListener("click", start_new_game);
    play_again_button.addEventListener("click", reset_game);

    // 페이지가 열리면 시작 화면을 먼저 보여줍니다.
    show_start_screen();
  </script>
</body>
</html>
