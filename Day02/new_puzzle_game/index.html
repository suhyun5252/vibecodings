<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단계형 카드 매칭 퍼즐 게임</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="app">
    <section class="screen" id="startScreen" aria-label="게임 시작 화면">
      <h1 class="title">카드 매칭 퍼즐</h1>
      <p class="screen-copy">쉬움 단계부터 시작해 모든 퍼즐을 차례대로 클리어해보세요.</p>
      <button class="primary-action" id="startButton" type="button">게임 시작</button>
    </section>

    <section class="screen hidden" id="gameScreen" aria-label="퍼즐 게임 화면">
      <h1 class="title">카드 매칭 퍼즐</h1>
      <p class="subtitle">같은 그림 2개를 찾아 모두 맞추면 다음 단계로 이동합니다.</p>

      <section class="toolbar" aria-label="게임 정보">
        <div class="stage-info">
          단계: <span id="stageCount">1/4</span>
          난이도: <span id="stageLabel">쉬움</span>
        </div>
        <div class="game-stat">
          시도 횟수: <span id="attemptCount">0</span>
          점수: <span id="scoreCount">0</span>
          콤보: +<span id="comboCount">0</span>
          남은 시간: <span id="timeCount">0</span>초
        </div>
        <button class="restart" id="restartButton" type="button">다시 시작</button>
      </section>

      <section class="board" id="board" aria-label="퍼즐 보드"></section>

      <div class="message" id="message">같은 그림을 찾아서 짝을 맞춰보세요.</div>
    </section>

    <section class="screen hidden" id="endScreen" aria-label="게임 종료 화면">
      <h1 class="title">축하합니다!</h1>
      <p class="screen-copy">모든 단계를 통과했습니다.</p>
      <p class="result-score">최종 점수: <span id="finalScore">0</span>점</p>
      <button class="primary-action" id="playAgainButton" type="button">다시 도전</button>
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>
