<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유튜브 학습 기록</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23ff0000'/%3E%3Cpath d='M26 20v24l21-12z' fill='white'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="brand-mark" aria-hidden="true">▶</div>
      <div>
        <h1>유튜브 학습 기록</h1>
        <p>학습한 영상 URL을 저장하고 완료 여부를 관리하세요.</p>
      </div>
    </header>

    <form class="url-form" id="urlForm">
      <label class="input-label" for="youtubeUrl">유튜브 URL</label>
      <div class="input-row">
        <div class="url-input-wrap">
          <input
            id="youtubeUrl"
            type="url"
            placeholder="https://www.youtube.com/watch?v=..."
            autocomplete="off"
            required
          />
          <button class="clear-input-button" id="clearUrlButton" type="button" aria-label="URL 입력 지우기">×</button>
        </div>
        <button type="submit">저장</button>
      </div>
      <label class="input-label tag-label" for="videoTags">태그</label>
      <input
        id="videoTags"
        type="text"
        placeholder="예: javascript, css, 알고리즘"
        autocomplete="off"
      />
      <p class="helper-text" id="formMessage">YouTube 또는 youtu.be 주소를 입력하세요.</p>
    </form>

    <section class="summary" aria-label="학습 기록 요약">
      <div>
        <span id="totalCount">0</span>
        <p>전체</p>
      </div>
      <div>
        <span id="doneCount">0</span>
        <p>완료</p>
      </div>
      <div>
        <span id="todoCount">0</span>
        <p>진행중</p>
      </div>
    </section>

    <section class="list-section">
      <div class="section-title">
        <h2>저장한 영상</h2>
        <button class="text-button" id="clearDoneButton" type="button">완료 항목 정리</button>
      </div>
      <ul class="video-list" id="videoList"></ul>
      <p class="empty-message" id="emptyMessage">아직 저장된 영상이 없습니다.</p>
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>
